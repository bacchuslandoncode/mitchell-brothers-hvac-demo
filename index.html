<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Mitchell Brothers Heating And Cooling | 24-Hour HVAC Service in Tempe, AZ</title>
    <meta name="description" content="Mitchell Brothers Heating And Cooling provides 24-hour AC repair, AC maintenance, heating repair, and system installation in Tempe and the East Valley." />
    <meta name="robots" content="noindex, nofollow" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="Mitchell Brothers Heating And Cooling" />
    <meta property="og:title"       content="Mitchell Brothers Heating And Cooling | 24-Hour HVAC Service in Tempe, AZ" />
    <meta property="og:description" content="24-hour HVAC contractor based in Tempe, AZ. AC repair, AC maintenance, heating repair, system installation, and emergency service." />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Mitchell Brothers Heating And Cooling | 24-Hour HVAC Service in Tempe, AZ" />
    <meta name="twitter:description" content="24-hour HVAC contractor based in Tempe, AZ. AC repair, AC maintenance, heating repair, system installation, and emergency service." />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />

    <!--
      Structured data (LocalBusiness/HVACBusiness JSON-LD) intentionally omitted.
      This is a demo concept, not the live site — verify all business details
      (license number, exact service radius) before launch. Add schema once confirmed.
    -->
  </head>
  <body>
    <div id="root"></div>

    <!--
      Static mirror of the React-rendered "request-service" form (src/sections/RequestService.jsx).
      Netlify's build-time bot only detects forms present in the static HTML output, not ones
      rendered client-side by React — this hidden copy exists solely so Netlify registers the
      form and its fields. It is never shown to visitors.
    -->
    <form name="request-service" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="tel" name="phone" />
      <select name="service"><option>AC Repair</option><option>AC Maintenance</option><option>Heating Repair</option><option>System Installation</option><option>Emergency Service</option><option>Other</option></select>
      <select name="preferredTime"><option>ASAP / Emergency</option><option>Morning</option><option>Afternoon</option><option>Evening</option><option>Flexible</option></select>
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
